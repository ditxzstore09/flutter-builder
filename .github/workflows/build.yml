name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: 📦 Extract ZIP
        run: |
          ZIP_FILE=$(find . -name "*.zip" | head -1)
          if [ -n "$ZIP_FILE" ]; then
            unzip -o "$ZIP_FILE" -d extracted/
            rm "$ZIP_FILE"
            if [ -d "extracted" ]; then
              # Cek struktur folder
              SUBDIR=$(find extracted -mindepth 1 -maxdepth 1 -type d | head -1)
              if [ -n "$SUBDIR" ]; then
                mv extracted/*/* ./ 2>/dev/null
              else
                mv extracted/* ./ 2>/dev/null
              fi
              rm -rf extracted
            fi
          fi
      
      - name: 🔍 Cari dan Fix pubspec.yaml
        run: |
          # Cari semua pubspec.yaml
          find . -name "pubspec.yaml" | while read file; do
            echo "🔧 Memperbaiki: $file"
            # Backup dulu
            cp "$file" "$file.bak"
            # Ganti SDK version jadi minimal
            sed -i 's/sdk:.*/sdk: ">=3.0.0 <4.0.0"/' "$file"
            # Tampilkan hasil
            echo "✅ Isi setelah fix:"
            grep -A2 "environment:" "$file"
          done
      
      - name: 🎯 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.0'
      
      - name: 🏗️ Build APK
        run: |
          # Cari pubspec.yaml yang udah di-fix
          PUBSPEC_PATH=$(find . -name "pubspec.yaml" | head -1)
          if [ -z "$PUBSPEC_PATH" ]; then
            echo "❌ TIDAK ADA PUBSPEC.YAML!"
            exit 1
          fi
          
          PROJECT_DIR=$(dirname "$PUBSPEC_PATH")
          echo "✅ Project di: $PROJECT_DIR"
          
          cd "$PROJECT_DIR"
          echo "📍 Pindah ke: $(pwd)"
          
          # Verifikasi SDK version
          echo "🔍 Cek SDK version:"
          grep -A2 "environment:" pubspec.yaml
          
          # Clean & build
          flutter clean
          flutter pub get
          flutter build apk --release
      
      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flutter-apk
          path: "**/build/app/outputs/flutter-apk/*.apk"
