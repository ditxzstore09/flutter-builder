name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Find and move pubspec.yaml
        run: |
          # Cari file pubspec.yaml di mana aja
          find . -name "pubspec.yaml" -exec dirname {} \; | head -1 > project_dir.txt
          PROJECT_DIR=$(cat project_dir.txt)
          echo "Project ditemukan di: $PROJECT_DIR"
          cd $PROJECT_DIR
          echo "PWD=$(pwd)" >> $GITHUB_ENV
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.0'
      
      - name: Build APK
        run: |
          cd $PWD
          flutter pub get
          flutter build apk --release
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flutter-apk
          path: ${{ env.PWD }}/build/app/outputs/flutter-apk/*.apk
