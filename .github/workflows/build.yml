name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: 📦 Extract ZIP jika ada
        run: |
          ZIP_FILE=$(find . -name "*.zip" | head -1)
          if [ -n "$ZIP_FILE" ]; then
            unzip -o "$ZIP_FILE" -d extracted/
            rm "$ZIP_FILE"
            if [ -d "extracted" ]; then
              SUBDIR=$(find extracted -mindepth 1 -maxdepth 1 -type d | head -1)
              if [ -n "$SUBDIR" ]; then
                mv extracted/*/* ./ 2>/dev/null || mv extracted/* ./ 2>/dev/null
              else
                mv extracted/* ./ 2>/dev/null
              fi
              rm -rf extracted
            fi
          fi

      - name: 🔧 Fix SDK version jika terlalu tinggi
        run: |
          find . -name "pubspec.yaml" | while read file; do
            sed -i 's/sdk: ">=3.[8-9][0-9]*\.[0-9]*/sdk: ">=3.0.0/' "$file"
          done

      - name: 🎯 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.0'

      - name: 🏗️ Build APK
        run: |
          PUBSPEC_PATH=$(find . -name "pubspec.yaml" | head -1)
          if [ -z "$PUBSPEC_PATH" ]; then
            echo "❌ pubspec.yaml tidak ditemukan"
            exit 1
          fi
          cd "$(dirname "$PUBSPEC_PATH")"
          flutter clean
          flutter pub get
          flutter build apk --release

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flutter-apk
          path: "**/build/app/outputs/flutter-apk/*.apk"
