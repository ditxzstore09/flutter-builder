name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Debug - Lihat isi folder
        run: |
          echo "=== ISI FOLDER ==="
          ls -la
          echo ""
          echo "=== CARI PUBSPEC.YAML ==="
          find . -name "pubspec.yaml"
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.0'
      
      - name: Build APK
        run: |
          # Cari pubspec.yaml
          PUBSPEC_PATH=$(find . -name "pubspec.yaml" | head -1)
          
          if [ -z "$PUBSPEC_PATH" ]; then
            echo "❌ TIDAK ADA PUBSPEC.YAML!"
            exit 1
          fi
          
          PROJECT_DIR=$(dirname "$PUBSPEC_PATH")
          echo "✅ Project ditemukan di: $PROJECT_DIR"
          
          cd "$PROJECT_DIR"
          echo "📍 Pindah ke: $(pwd)"
          
          flutter pub get
          flutter build apk --release
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flutter-apk
          path: "**/build/app/outputs/flutter-apk/*.apk"
